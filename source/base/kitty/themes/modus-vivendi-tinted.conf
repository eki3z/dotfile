# Modus Vivendi (Custom Variant) for Kitty
# 这是一个高对比度主题，充分利用了标准色与强化色的区分

# --- The 16 terminal colors ---

# Black (背景与暗灰)
color0 #1d2235
color8 #61647a

# Red (标准红 vs 强化红)
color1 #ff5f59
color9 #ff5f5f

# Green (标准绿 vs 强化绿)
color2  #44bc44
color10 #44df44

# Yellow (标准黄 vs 强化黄)
color3  #d0bc00
color11 #efef00

# Blue (标准蓝 vs 强化蓝)
color4  #2fafff
color12 #338fff

# Magenta (标准洋红 vs 强化洋红)
color5  #feacd0
color13 #ff66ff

# Cyan (标准青 vs 强化青)
color6  #00d3d0
color14 #00eff0

# White (标准灰白 vs 纯白)
color7  #989898
color15 #c6daff


# --- Window colors ---

# 基础前景与背景
foreground #c6daff
background #0d0e1c

# 选中文本 (使用 fg-alt 作为背景，增强辨识度)
selection_foreground #0d0e1c
selection_background #c6daff

# --- Cursor ---

# 光标颜色与光标上的文本颜色
cursor #c6daff
cursor_text_color #0d0e1c


# --- URLs ---

# 鼠标悬停在 URL 上的颜色 (使用 blue)
url_color #2fafff


# --- Window Borders ---

# 窗口边框 (使用 border 和 bg-dim 区分)
active_border_color   #61647a
inactive_border_color #1d2235


# --- Tab Bar ---

# 活动标签页
active_tab_foreground     #0d0e1c
active_tab_background     #c6daff
active_tab_font_style     bold

# 非活动标签页 (使用 fg-dim 和 bg-inactive)
inactive_tab_foreground   #989898
inactive_tab_background   #0d0e1c
inactive_tab_font_style   normal


# --- OS Window Titlebar (Linux/macOS) ---

wayland_titlebar_color    #0d0e1c
macos_titlebar_color      #0d0e1c